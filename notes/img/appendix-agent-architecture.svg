<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Agent architecture</title>
  <desc id="desc">User, app, Bedrock Agents, knowledge base, action group, lambda, internal systems, and human approval.</desc>
  <defs>
    <style>
      .bg { fill: #fbfcf8; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 16; ry: 16; }
      .aws { fill: #fff4e5; }
      .data { fill: #eef7ff; }
      .risk { fill: #fff1f2; }
      .line { stroke: #1f2937; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 10 8; }
      .title { font: 700 26px Arial, sans-serif; fill: #111827; }
      .label { font: 700 19px Arial, sans-serif; fill: #111827; }
      .small { font: 15px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="620"/>
  <text class="title" x="60" y="50">Agent Task Assistant</text>

  <rect class="box" x="60" y="210" width="150" height="90"/>
  <text class="label" x="112" y="265">User</text>

  <rect class="box" x="280" y="190" width="210" height="130"/>
  <text class="label" x="354" y="240">Web / App</text>
  <text class="small" x="326" y="270">Session and auth</text>
  <text class="small" x="325" y="292">Conversation UI</text>

  <rect class="box aws" x="560" y="170" width="260" height="170"/>
  <text class="label" x="625" y="220">Amazon Bedrock</text>
  <text class="label" x="660" y="248">Agents</text>
  <text class="small" x="610" y="278">Pre-process</text>
  <text class="small" x="610" y="300">Plan / orchestrate</text>
  <text class="small" x="610" y="322">Respond</text>

  <rect class="box aws" x="920" y="90" width="220" height="120"/>
  <text class="label" x="971" y="140">Knowledge Base</text>
  <text class="small" x="996" y="170">Optional grounding</text>

  <rect class="box aws" x="920" y="250" width="220" height="120"/>
  <text class="label" x="975" y="300">Action Group</text>
  <text class="small" x="971" y="330">OpenAPI / function schema</text>

  <rect class="box aws" x="920" y="410" width="220" height="120"/>
  <text class="label" x="995" y="460">Lambda</text>
  <text class="small" x="962" y="490">Validate and call APIs</text>

  <rect class="box data" x="60" y="430" width="320" height="120"/>
  <text class="label" x="122" y="478">Internal Systems / Data</text>
  <text class="small" x="130" y="508">CRM, ERP, ticketing, order APIs</text>

  <rect class="box risk" x="450" y="430" width="300" height="120"/>
  <text class="label" x="516" y="478">Approval / Control</text>
  <text class="small" x="490" y="508">Step Functions or human review</text>

  <path class="line" d="M210 255 H280"/>
  <path class="line" d="M490 255 H560"/>
  <path class="line" d="M820 230 H920"/>
  <path class="line" d="M820 300 H920"/>
  <path class="line" d="M1030 370 V410"/>
  <path class="line" d="M920 470 H750"/>
  <path class="line" d="M380 490 H450"/>
  <path class="line" d="M600 430 V340"/>
  <path class="line dash" d="M600 170 V110 H1030 V90"/>
  <path class="line" d="M920 470 H380"/>

  <text class="small" x="606" y="128">optional retrieval</text>
  <text class="small" x="846" y="294">tool choice</text>
  <text class="small" x="762" y="462">high-risk action</text>
  <text class="small" x="260" y="178">user request</text>
</svg>
