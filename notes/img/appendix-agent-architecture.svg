<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="540" viewBox="0 0 1050 540" role="img" aria-labelledby="title desc">
  <title id="title">エージェントアーキテクチャ</title>
  <desc id="desc">ユーザー、アプリ、Bedrock Agents、ナレッジベース、アクショングループ、Lambda、内部システム、承認制御の構成図</desc>
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .box { fill: #ffffff; stroke: #374151; stroke-width: 1.5; rx: 12; ry: 12; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.08)); }
      .aws { fill: #fef3c7; }
      .data { fill: #e0f2fe; }
      .risk { fill: #fee2e2; }
      .line { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
      .title { font: 700 22px "Hiragino Sans", "Meiryo", sans-serif; fill: #111827; }
      .label { font: 600 15px "Hiragino Sans", "Meiryo", sans-serif; fill: #1f2937; text-anchor: middle; }
      .small { font: 13px "Hiragino Sans", "Meiryo", sans-serif; fill: #4b5563; text-anchor: middle; }
      .note { font: 12px "Hiragino Sans", "Meiryo", sans-serif; fill: #6b7280; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1050" height="540"/>
  <text class="title" x="50" y="40">エージェントタスクアシスタント</text>

  <!-- ユーザー: x=50, y=180, w=110, h=70 → 中心(105, 215) -->
  <rect class="box" x="50" y="180" width="110" height="70"/>
  <text class="label" x="105" y="220">ユーザー</text>

  <!-- ウェブ/アプリ: x=210, y=160, w=160, h=110 → 中心(290, 215) -->
  <rect class="box" x="210" y="160" width="160" height="110"/>
  <text class="label" x="290" y="200">ウェブ / アプリ</text>
  <text class="small" x="290" y="225">セッション・認証</text>
  <text class="small" x="290" y="247">会話 UI</text>

  <!-- Bedrock Agents: x=420, y=140, w=210, h=150 → 中心(525, 215) -->
  <rect class="box aws" x="420" y="140" width="210" height="150"/>
  <text class="label" x="525" y="180">Amazon Bedrock</text>
  <text class="label" x="525" y="202">Agents</text>
  <text class="small" x="525" y="230">前処理</text>
  <text class="small" x="525" y="252">計画・オーケストレーション</text>
  <text class="small" x="525" y="274">応答</text>

  <!-- ナレッジベース: x=700, y=70, w=180, h=90 → 中心(790, 115) -->
  <rect class="box aws" x="700" y="70" width="180" height="90"/>
  <text class="label" x="790" y="108">ナレッジベース</text>
  <text class="small" x="790" y="133">オプションのグラウンディング</text>

  <!-- アクショングループ: x=700, y=185, w=180, h=90 → 中心(790, 230) -->
  <rect class="box aws" x="700" y="185" width="180" height="90"/>
  <text class="label" x="790" y="223">アクショングループ</text>
  <text class="small" x="790" y="248">OpenAPI / 関数スキーマ</text>

  <!-- Lambda: x=700, y=300, w=180, h=90 → 中心(790, 345) -->
  <rect class="box aws" x="700" y="300" width="180" height="90"/>
  <text class="label" x="790" y="338">Lambda</text>
  <text class="small" x="790" y="363">検証・API 呼び出し</text>

  <!-- 内部システム/データ: x=50, y=370, w=260, h=100 → 中心(180, 420) -->
  <rect class="box data" x="50" y="370" width="260" height="100"/>
  <text class="label" x="180" y="410">内部システム / データ</text>
  <text class="small" x="180" y="438">CRM, ERP, チケット, 注文 API</text>

  <!-- 承認/制御: x=360, y=370, w=230, h=100 → 中心(475, 420) -->
  <rect class="box risk" x="360" y="370" width="230" height="100"/>
  <text class="label" x="475" y="410">承認 / 制御</text>
  <text class="small" x="475" y="438">Step Functions または人手レビュー</text>

  <!-- 接続線 -->
  <!-- ユーザー(160,215) → ウェブ/アプリ(210,215) -->
  <path class="line" d="M160 215 H210"/>

  <!-- ウェブ/アプリ(370,215) → Agents(420,215) -->
  <path class="line" d="M370 215 H420"/>

  <!-- Agents(630,180) → ナレッジベース(700,115) -->
  <path class="line" d="M630 180 H665 V115 H700"/>

  <!-- Agents(630,230) → アクショングループ(700,230) -->
  <path class="line" d="M630 230 H700"/>

  <!-- アクショングループ(790,275) → Lambda(790,300) -->
  <path class="line" d="M790 275 V300"/>

  <!-- Lambda(700,345) → 承認/制御(590,420) -->
  <path class="line" d="M700 345 H640 V420 H590"/>

  <!-- 内部システム(310,420) → 承認/制御(360,420) -->
  <path class="line" d="M310 420 H360"/>

  <!-- 承認/制御(475,370) → Agents(525,290) -->
  <path class="line" d="M475 370 V330 H420"/>

  <!-- Agents上部から戻りの線（オプションの検索）: Agents(525,140) → 上へ → 右へ → ナレッジベース(790,70) -->
  <path class="line dash" d="M525 140 V60 H790 V70"/>

  <!-- Lambda(700,365) → 内部システム(310,400) -->
  <path class="line" d="M700 365 H640 V400 H310"/>

  <!-- ラベル -->
  <text class="note" x="580" y="52">オプションの検索</text>
  <text class="note" x="645" y="220">ツール選択</text>
  <text class="note" x="620" y="448">高リスクアクション</text>
  <text class="note" x="205" y="150">ユーザーリクエスト</text>
</svg>
