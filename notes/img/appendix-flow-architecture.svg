<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Fixed workflow architecture</title>
  <desc id="desc">Event or API enters a fixed sequence orchestrated by Bedrock Flows or Step Functions.</desc>
  <defs>
    <style>
      .bg { fill: #fcfcf8; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 16; ry: 16; }
      .aws { fill: #fff4e5; }
      .data { fill: #eef7ff; }
      .line { stroke: #1f2937; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .title { font: 700 26px Arial, sans-serif; fill: #111827; }
      .label { font: 700 18px Arial, sans-serif; fill: #111827; }
      .small { font: 15px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="520"/>
  <text class="title" x="60" y="50">Fixed Workflow Pattern</text>

  <rect class="box" x="60" y="190" width="160" height="90"/>
  <text class="label" x="107" y="245">API / Event</text>

  <rect class="box aws" x="290" y="165" width="250" height="140"/>
  <text class="label" x="358" y="215">Orchestrator</text>
  <text class="small" x="338" y="245">Bedrock Flows</text>
  <text class="small" x="336" y="267">or Step Functions</text>

  <rect class="box" x="620" y="90" width="180" height="90"/>
  <text class="label" x="657" y="143">Classify</text>

  <rect class="box" x="620" y="215" width="180" height="90"/>
  <text class="label" x="660" y="268">Retrieve</text>

  <rect class="box" x="620" y="340" width="180" height="90"/>
  <text class="label" x="657" y="393">Generate</text>

  <rect class="box data" x="890" y="90" width="170" height="90"/>
  <text class="label" x="936" y="143">Validate</text>

  <rect class="box data" x="890" y="215" width="170" height="90"/>
  <text class="label" x="930" y="268">Approve</text>

  <rect class="box data" x="890" y="340" width="220" height="90"/>
  <text class="label" x="948" y="393">Downstream App</text>

  <rect class="box aws" x="60" y="360" width="220" height="90"/>
  <text class="label" x="106" y="413">Retry / Timeout / Audit</text>

  <path class="line" d="M220 235 H290"/>
  <path class="line" d="M540 235 H620"/>
  <path class="line" d="M710 180 V215"/>
  <path class="line" d="M710 305 V340"/>
  <path class="line" d="M800 135 H890"/>
  <path class="line" d="M800 260 H890"/>
  <path class="line" d="M800 385 H890"/>
  <path class="line" d="M170 360 V305 H290"/>

  <text class="small" x="559" y="224">fixed sequence</text>
  <text class="small" x="78" y="338">control plane</text>
</svg>
