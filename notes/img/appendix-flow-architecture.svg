<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="460" viewBox="0 0 1050 460" role="img" aria-labelledby="title desc">
  <title id="title">固定ワークフローアーキテクチャ</title>
  <desc id="desc">イベントまたはAPIから開始し、Bedrock FlowsまたはStep Functionsで固定シーケンスを実行する構成図</desc>
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .box { fill: #ffffff; stroke: #374151; stroke-width: 1.5; rx: 12; ry: 12; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.08)); }
      .aws { fill: #fef3c7; }
      .data { fill: #e0f2fe; }
      .line { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .title { font: 700 22px "Hiragino Sans", "Meiryo", sans-serif; fill: #111827; }
      .label { font: 600 15px "Hiragino Sans", "Meiryo", sans-serif; fill: #1f2937; text-anchor: middle; }
      .small { font: 13px "Hiragino Sans", "Meiryo", sans-serif; fill: #4b5563; text-anchor: middle; }
      .note { font: 12px "Hiragino Sans", "Meiryo", sans-serif; fill: #6b7280; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1050" height="460"/>
  <text class="title" x="50" y="40">固定ワークフローパターン</text>

  <!-- API/イベント: x=50, y=175, w=130, h=70 → 中心(115, 210) -->
  <rect class="box" x="50" y="175" width="130" height="70"/>
  <text class="label" x="115" y="215">API / イベント</text>

  <!-- オーケストレーター: x=230, y=150, w=200, h=120 → 中心(330, 210) -->
  <rect class="box aws" x="230" y="150" width="200" height="120"/>
  <text class="label" x="330" y="195">オーケストレーター</text>
  <text class="small" x="330" y="220">Bedrock Flows</text>
  <text class="small" x="330" y="242">または Step Functions</text>

  <!-- 分類: x=480, y=80, w=140, h=70 → 中心(550, 115) -->
  <rect class="box" x="480" y="80" width="140" height="70"/>
  <text class="label" x="550" y="120">分類</text>

  <!-- 検索: x=480, y=175, w=140, h=70 → 中心(550, 210) -->
  <rect class="box" x="480" y="175" width="140" height="70"/>
  <text class="label" x="550" y="215">検索</text>

  <!-- 生成: x=480, y=270, w=140, h=70 → 中心(550, 305) -->
  <rect class="box" x="480" y="270" width="140" height="70"/>
  <text class="label" x="550" y="310">生成</text>

  <!-- 検証: x=670, y=80, w=130, h=70 → 中心(735, 115) -->
  <rect class="box data" x="670" y="80" width="130" height="70"/>
  <text class="label" x="735" y="120">検証</text>

  <!-- 承認: x=670, y=175, w=130, h=70 → 中心(735, 210) -->
  <rect class="box data" x="670" y="175" width="130" height="70"/>
  <text class="label" x="735" y="215">承認</text>

  <!-- 後続アプリ: x=670, y=270, w=160, h=70 → 中心(750, 305) -->
  <rect class="box data" x="670" y="270" width="160" height="70"/>
  <text class="label" x="750" y="310">後続アプリ</text>

  <!-- リトライ/タイムアウト/監査: x=50, y=320, w=240, h=70 → 中心(170, 355) -->
  <rect class="box aws" x="50" y="320" width="240" height="70"/>
  <text class="label" x="170" y="360">リトライ / タイムアウト / 監査</text>

  <!-- 接続線 -->
  <!-- API/イベント(180,210) → オーケストレーター(230,210) -->
  <path class="line" d="M180 210 H230"/>

  <!-- オーケストレーター(430,210) → 検索(480,210) -->
  <path class="line" d="M430 210 H480"/>

  <!-- 分類(550,150) → 検索(550,175) -->
  <path class="line" d="M550 150 V175"/>

  <!-- 検索(550,245) → 生成(550,270) -->
  <path class="line" d="M550 245 V270"/>

  <!-- 分類(620,115) → 検証(670,115) -->
  <path class="line" d="M620 115 H670"/>

  <!-- 検索(620,210) → 承認(670,210) -->
  <path class="line" d="M620 210 H670"/>

  <!-- 生成(620,305) → 後続アプリ(670,305) -->
  <path class="line" d="M620 305 H670"/>

  <!-- リトライ(170,320) → 上へ → オーケストレーター(230,270) -->
  <path class="line" d="M170 320 V285 H230"/>

  <!-- ラベル -->
  <text class="note" x="445" y="200">固定シーケンス</text>
  <text class="note" x="68" y="305">コントロールプレーン</text>
</svg>
