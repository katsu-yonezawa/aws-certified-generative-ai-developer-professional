<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="480" viewBox="0 0 1100 480" role="img" aria-labelledby="title desc">
  <title id="title">RAG アーキテクチャ</title>
  <desc id="desc">ユーザー、アプリ、Bedrock Knowledge Bases、ベクトルストア、データソース、基盤モデルの構成図</desc>
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .box { fill: #ffffff; stroke: #374151; stroke-width: 1.5; rx: 12; ry: 12; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.08)); }
      .aws { fill: #fef3c7; }
      .data { fill: #e0f2fe; }
      .accent { fill: #f3f4f6; }
      .line { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
      .title { font: 700 22px "Hiragino Sans", "Meiryo", sans-serif; fill: #111827; }
      .label { font: 600 16px "Hiragino Sans", "Meiryo", sans-serif; fill: #1f2937; text-anchor: middle; }
      .small { font: 13px "Hiragino Sans", "Meiryo", sans-serif; fill: #4b5563; text-anchor: middle; }
      .note { font: 12px "Hiragino Sans", "Meiryo", sans-serif; fill: #6b7280; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="480"/>
  <text class="title" x="50" y="40">RAG ナレッジアシスタント</text>

  <!-- ユーザー: x=50, y=140, w=120, h=80 → 中心(110, 180) -->
  <rect class="box accent" x="50" y="140" width="120" height="80"/>
  <text class="label" x="110" y="185">ユーザー</text>

  <!-- ウェブ/アプリ: x=220, y=120, w=180, h=120 → 中心(310, 180) -->
  <rect class="box" x="220" y="120" width="180" height="120"/>
  <text class="label" x="310" y="160">ウェブ / アプリ</text>
  <text class="small" x="310" y="185">認証・セッション・UI</text>
  <text class="small" x="310" y="207">API 制御</text>

  <!-- Knowledge Bases: x=450, y=100, w=250, h=160 → 中心(575, 180) -->
  <rect class="box aws" x="450" y="100" width="250" height="160"/>
  <text class="label" x="575" y="145">Amazon Bedrock</text>
  <text class="label" x="575" y="170">Knowledge Bases</text>
  <text class="small" x="575" y="200">検索・プロンプト拡張</text>
  <text class="small" x="575" y="222">引用付き回答生成</text>

  <!-- ベクトルストア: x=750, y=100, w=200, h=160 → 中心(850, 180) -->
  <rect class="box data" x="750" y="100" width="200" height="160"/>
  <text class="label" x="850" y="145">ベクトルストア</text>
  <text class="small" x="850" y="177">OpenSearch Serverless</text>
  <text class="small" x="850" y="199">Aurora pgvector</text>
  <text class="small" x="850" y="221">マネージドストア</text>

  <!-- 基盤モデル: x=450, y=310, w=250, h=100 → 中心(575, 360) -->
  <rect class="box aws" x="450" y="310" width="250" height="100"/>
  <text class="label" x="575" y="355">基盤モデル</text>
  <text class="small" x="575" y="380">文脈を考慮した回答</text>

  <!-- データソース: x=50, y=310, w=350, h=100 → 中心(225, 360) -->
  <rect class="box data" x="50" y="310" width="350" height="100"/>
  <text class="label" x="225" y="350">データソース</text>
  <text class="small" x="225" y="378">Amazon S3, Confluence, SharePoint, Salesforce</text>

  <!-- 接続線 -->
  <!-- ユーザー(170,180) → ウェブ/アプリ(220,180) -->
  <path class="line" d="M170 180 H220"/>

  <!-- ウェブ/アプリ(400,180) → KB(450,180) -->
  <path class="line" d="M400 180 H450"/>

  <!-- KB(700,180) → ベクトルストア(750,180) -->
  <path class="line" d="M700 180 H750"/>

  <!-- ベクトルストア(750,200) ← KB(700,200) 破線 -->
  <path class="line dash" d="M750 200 H700"/>

  <!-- KB(575,260) → 基盤モデル(575,310) -->
  <path class="line" d="M575 260 V310"/>

  <!-- データソース(400,360) → 基盤モデル(450,360) -->
  <path class="line" d="M400 360 H450"/>

  <!-- 基盤モデル(450,340) → データソース(400,340) 破線 -->
  <path class="line dash" d="M450 340 H400"/>

  <!-- KB上部から戻りの線: KB(575,100) → 上へ → 左へ → ウェブ/アプリ(310,120) -->
  <path class="line" d="M575 100 V70 H310 V120"/>

  <!-- ラベル -->
  <text class="note" x="520" y="60">検索＋拡張</text>
  <text class="note" x="725" y="170">セマンティック検索</text>
  <text class="note" x="420" y="380">同期 / 取り込み</text>
  <text class="note" x="195" y="110">クエリ</text>
</svg>
