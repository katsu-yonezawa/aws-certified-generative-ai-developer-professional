<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="520" viewBox="0 0 1260 520" role="img" aria-labelledby="title desc">
  <title id="title">Batch inference architecture</title>
  <desc id="desc">S3 input, Bedrock batch inference job, S3 output, EventBridge notifications, and post-processing.</desc>
  <defs>
    <style>
      .bg { fill: #fcfcf8; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 16; ry: 16; }
      .aws { fill: #fff4e5; }
      .data { fill: #eef7ff; }
      .line { stroke: #1f2937; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 10 8; }
      .title { font: 700 26px Arial, sans-serif; fill: #111827; }
      .label { font: 700 18px Arial, sans-serif; fill: #111827; }
      .small { font: 15px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1260" height="520"/>
  <text class="title" x="60" y="50">Asynchronous Batch Inference</text>

  <rect class="box" x="60" y="190" width="170" height="90"/>
  <text class="label" x="92" y="245">Source System</text>

  <rect class="box data" x="300" y="90" width="210" height="110"/>
  <text class="label" x="377" y="135">Amazon S3</text>
  <text class="small" x="355" y="165">Input JSONL files</text>

  <rect class="box aws" x="570" y="160" width="280" height="150"/>
  <text class="label" x="620" y="212">Amazon Bedrock</text>
  <text class="label" x="632" y="238">Batch Inference</text>
  <text class="small" x="626" y="268">Asynchronous job</text>

  <rect class="box data" x="930" y="90" width="210" height="110"/>
  <text class="label" x="1007" y="135">Amazon S3</text>
  <text class="small" x="987" y="165">Output files</text>

  <rect class="box aws" x="930" y="260" width="210" height="110"/>
  <text class="label" x="977" y="305">EventBridge</text>
  <text class="small" x="965" y="335">Job state change</text>

  <rect class="box aws" x="300" y="320" width="250" height="110"/>
  <text class="label" x="375" y="365">Lambda / Step Functions</text>
  <text class="small" x="360" y="395">Post-process and fan-out</text>

  <path class="line" d="M230 235 H300"/>
  <path class="line" d="M405 200 V160 H570"/>
  <path class="line" d="M850 200 H930"/>
  <path class="line dash" d="M850 260 H930"/>
  <path class="line" d="M930 315 H550"/>
  <path class="line dash" d="M405 320 V200"/>

  <text class="small" x="286" y="152">upload</text>
  <text class="small" x="690" y="148">process</text>
  <text class="small" x="874" y="188">results</text>
  <text class="small" x="861" y="248">status</text>
</svg>
