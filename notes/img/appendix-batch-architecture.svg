<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc">
  <title id="title">バッチ推論アーキテクチャ</title>
  <desc id="desc">S3入力、Bedrockバッチ推論ジョブ、S3出力、EventBridge通知、後処理の構成図</desc>
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .box { fill: #ffffff; stroke: #374151; stroke-width: 1.5; rx: 12; ry: 12; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.08)); }
      .aws { fill: #fef3c7; }
      .data { fill: #e0f2fe; }
      .line { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
      .title { font: 700 22px "Hiragino Sans", "Meiryo", sans-serif; fill: #111827; }
      .label { font: 600 15px "Hiragino Sans", "Meiryo", sans-serif; fill: #1f2937; text-anchor: middle; }
      .small { font: 13px "Hiragino Sans", "Meiryo", sans-serif; fill: #4b5563; text-anchor: middle; }
      .note { font: 12px "Hiragino Sans", "Meiryo", sans-serif; fill: #6b7280; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1000" height="440"/>
  <text class="title" x="50" y="40">非同期バッチ推論</text>

  <!-- ソースシステム: x=50, y=160, w=140, h=70 → 中心(120, 195) -->
  <rect class="box" x="50" y="160" width="140" height="70"/>
  <text class="label" x="120" y="200">ソースシステム</text>

  <!-- S3入力: x=240, y=80, w=170, h=90 → 中心(325, 125) -->
  <rect class="box data" x="240" y="80" width="170" height="90"/>
  <text class="label" x="325" y="118">Amazon S3</text>
  <text class="small" x="325" y="145">入力 JSONL ファイル</text>

  <!-- Bedrockバッチ推論: x=460, y=130, w=220, h=130 → 中心(570, 195) -->
  <rect class="box aws" x="460" y="130" width="220" height="130"/>
  <text class="label" x="570" y="175">Amazon Bedrock</text>
  <text class="label" x="570" y="200">バッチ推論</text>
  <text class="small" x="570" y="230">非同期ジョブ</text>

  <!-- S3出力: x=730, y=80, w=170, h=90 → 中心(815, 125) -->
  <rect class="box data" x="730" y="80" width="170" height="90"/>
  <text class="label" x="815" y="118">Amazon S3</text>
  <text class="small" x="815" y="145">出力ファイル</text>

  <!-- EventBridge: x=730, y=220, w=170, h=90 → 中心(815, 265) -->
  <rect class="box aws" x="730" y="220" width="170" height="90"/>
  <text class="label" x="815" y="258">EventBridge</text>
  <text class="small" x="815" y="285">ジョブ状態変更</text>

  <!-- Lambda/Step Functions: x=240, y=290, w=210, h=90 → 中心(345, 335) -->
  <rect class="box aws" x="240" y="290" width="210" height="90"/>
  <text class="label" x="345" y="328">Lambda / Step Functions</text>
  <text class="small" x="345" y="355">後処理・ファンアウト</text>

  <!-- 接続線 -->
  <!-- ソースシステム(190,195) → S3入力の左下付近 -->
  <path class="line" d="M190 195 H220 V125 H240"/>

  <!-- S3入力(410,125) → Bedrockバッチ推論(460,165) -->
  <path class="line" d="M410 125 H435 V165 H460"/>

  <!-- Bedrockバッチ推論(680,165) → S3出力(730,125) -->
  <path class="line" d="M680 165 H705 V125 H730"/>

  <!-- Bedrockバッチ推論(680,225) → EventBridge(730,265) 破線 -->
  <path class="line dash" d="M680 225 H705 V265 H730"/>

  <!-- EventBridge(730,265) → Lambda/Step Functions(450,335) -->
  <path class="line" d="M730 265 H700 V335 H450"/>

  <!-- Lambda/Step Functions(345,290) → S3入力(325,170) 破線 -->
  <path class="line dash" d="M345 290 V200 H220 V145 H240"/>

  <!-- ラベル -->
  <text class="note" x="205" y="110">アップロード</text>
  <text class="note" x="435" y="110">処理</text>
  <text class="note" x="705" y="110">結果</text>
  <text class="note" x="705" y="240">ステータス</text>
</svg>
